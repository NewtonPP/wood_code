# Cloud Run service — public backend + built frontend.
# Declarative reference; fill the __PLACEHOLDERS__ then:
#   gcloud run services replace deploy/backend.service.yaml --region=__REGION__
# (DEPLOYMENT.md shows the equivalent imperative `gcloud run deploy`.)
#
# Secrets (ADMIN_PASSWORD, DATABASE_URL, ADMIN_EMAIL) are pulled from Secret
# Manager. The Cloud SQL instance is attached via the cloudsql-instances
# annotation; DATABASE_URL should use the unix socket host, e.g.
#   postgresql://USER:PASS@/woodchip?host=/cloudsql/__SQL_CONNECTION_NAME__
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: woodchip-backend
  annotations:
    run.googleapis.com/ingress: all          # public
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cloudsql-instances: __SQL_CONNECTION_NAME__
    spec:
      containers:
        - image: __REGION__-docker.pkg.dev/__PROJECT_ID__/__REPO__/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: WOODCHIP_ROLE
              value: "cloud"
            - name: WOODCHIP_COOKIE_SECURE
              value: "1"
            - name: INFERENCE_URL
              value: "__INFERENCE_URL__"        # internal URL of woodchip-inference
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ADMIN_EMAIL
                  key: latest
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ADMIN_PASSWORD
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
