# Cloud Build: build + push both images to Artifact Registry.
#
# Usage:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#       --substitutions=_REGION=us-central1,_REPO=woodchip
#
# Produces:
#   ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
#   ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/inference:latest

substitutions:
  _REGION: us-central1
  _REPO: woodchip

steps:
  # Backend + built frontend (root Dockerfile, multi-stage).
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - -f
      - Dockerfile
      - .

  # Inference service (build context = repo root so woodchip_core is included).
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/inference:latest
      - -f
      - inference_service/Dockerfile
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/inference:latest

options:
  machineType: E2_HIGHCPU_8
